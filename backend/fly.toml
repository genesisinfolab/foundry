app = "foundry-backend"
primary_region = "iad"

[build]

[env]
  DATABASE_URL = "sqlite:////data/foundry.db"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # IMPORTANT: Keep at 1 so APScheduler stays alive and scan cycles aren't missed.
  # Setting to 0 causes the VM to sleep between requests, killing all cron jobs.
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "foundry_data"
  destination = "/data"
